function admDash(){

    const pending=orders.filter(o=>o.status==='pending').length,processing=orders.filter(o=>o.status==='processing').length;
    return`<h2 class="font-display text-2xl font-extrabold tracking-tight mb-6">Dashboard</h2>
    <div class="grid sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">

        <div class="stat-card" style="background:linear-gradient(135deg,#059669,#047857)"><p class="text-sm opacity-80">Orders</p><p class="text-3xl font-display font-extrabold mt-1">${orders.length}</p></div>
        <div class="stat-card" style="background:linear-gradient(135deg,#D97706,#B45309)"><p class="text-sm opacity-80">Pending/Processing</p><p class="text-3xl font-display font-extrabold mt-1">${pending} / ${processing}</p></div>
        <div class="stat-card" style="background:linear-gradient(135deg,#7C3AED,#6D28D9)"><p class="text-sm opacity-80">Revenue</p><p class="text-3xl font-display font-extrabold mt-1">${fmt(rev)}</p></div>
    </div>
    <div class="grid lg:grid-cols-2 gap-6">
        <div class="card card-elevated p-6"><h3 class="font-display font-bold mb-4">Recent Orders</h3>${orders.length===0?'<p class="text-slate-400 text-sm py-8 text-center">No orders</p>':`<div class="space-y-2">${orders.slice(-5).reverse().map(o=>`<div class="flex items-center justify-between p-3 rounded-xl bg-slate-50 text-sm"><div><span class="font-bold">#${orderNo(o.id)}</span><span class="text-slate-400 ml-2">${o.customer.name}</span></div><div class="flex items-center gap-2"><span class="font-bold">${fmt(o.total)}</span><span class="badge ${o.status==='pending'?'badge-warning':o.status==='processing'?'badge-processing':'badge-success'}">${o.status}</span></div></div>`).join('')}</div>`}</div>

    </div>`;
}

function printAndNotify(id){
    const orders=DB.get('orders',[]),o=orders.find(x=>x.id===id);
    if(!o)return;
    const pay=DB.get('payments',[]).find(p=>p.id===o.paymentId),s=S(),pre=DB.get('orderPrefix','TH'),onum=o.orderNum||id.slice(-5);
    // Change status to processing
    o.status='processing';DB.set('orders',orders);
    // Professional SMS
    const smsText=`Dear ${o.customer.name},\n\nYour order #${pre}-${onum} has been confirmed and is being prepared.\n\nOrder Total: ${fmt(o.total)}\nPayment: ${pay?pay.type:'N/A'}\nDelivery: ${o.customer.city}\n\nYour order will be delivered within 2-3 business days.\n\nThank you for shopping with ${s.siteName||'TrendHive'}!\nHelpline: 0312-1234567`;
    // Professional Email
    const emailText=`Subject: Order Confirmed - #${pre}-${onum} | ${s.siteName||'TrendHive'}\n\nDear ${o.customer.name},\n\nThank you for your order! We are pleased to confirm that your order has been received and is now being processed.\n\nORDER DETAILS:\nOrder Number: #${pre}-${onum}\nDate: ${new Date(o.date).toLocaleString()}\nPayment Method: ${pay?pay.type:'N/A'}\nDelivery Address: ${o.customer.address}, ${o.customer.city}\n\nITEMS:\n${o.items.map(it=>`- ${it.name} x${it.qty} = ${fmt(it.price*it.qty)}`).join('\n')}\n\nSubtotal: ${fmt(o.total-o.delivery)}\nDelivery: ${fmt(o.delivery)}\nTOTAL: ${fmt(o.total)}\n\nYour order will be delivered within 2-3 business days. You will receive another notification when your order is dispatched.\n\nFor any queries, contact us at 0312-1234567 or info@trendhive.pk\n\nBest Regards,\n${s.siteName||'TrendHive'} Team`;
    // Show notification modal
